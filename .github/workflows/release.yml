name: Release Desktop Apps

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag, for example v0.0.1
        required: true
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            name: windows
            args: --verbose
          - platform: ubuntu-22.04
            name: linux
            args: --verbose
          - platform: macos-latest
            name: macos-aarch64
            args: --target aarch64-apple-darwin --verbose
          - platform: macos-latest
            name: macos-x86_64
            args: --target x86_64-apple-darwin --verbose

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci --include=dev --registry=https://registry.npmjs.org/ --replace-registry-host=always

      - name: Build and upload release assets
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: Daily Todo App ${{ github.event.inputs.tag || github.ref_name }}
          releaseBody: Desktop installers are available below.
          releaseDraft: true
          prerelease: false
          releaseAssetNamePattern: daily-todo-app_[version]_[platform]_[arch]_[bundle][setup][ext]
          args: ${{ matrix.args }}
